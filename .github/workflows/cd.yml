name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  test-e2e:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install dependencies (make install)
        run: make install
      - name: Start E2E stack
        run: make e2e-stack-up
      - name: Run E2E tests
        run: |
          source .venv/bin/activate
          E2E_APP_PORT=8002 python -m pytest tests/e2e/ -v
      - name: Tear down E2E stack
        if: always()
        run: make e2e-stack-down

  build-push:
    needs: test-e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/jerosanchez/clicknback:latest
            ghcr.io/jerosanchez/clicknback:sha-${{ github.event.workflow_run.head_sha }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/jerosanchez/clicknback:latest
            docker compose -f /home/clicknback/app/docker-compose.yml up -d --no-build --remove-orphans

      - name: Wait for readiness
        run: curl --retry 10 --retry-delay 3 --fail https://clicknback.com/health/ready
