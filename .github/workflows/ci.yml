name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  DATABASE_URL: "postgresql://user:password@localhost:5432/db"
  OAUTH_HASH_KEY: "7bdb4bcf0b01f00ca206693965b29145611d9419563630525dc848024c38fc08"
  OAUTH_ALGORITHM: "HS256"
  OAUTH_TOKEN_TTL: "30"
  MAX_CASHBACK_PERCENTAGE: "20"
  DEFAULT_PAGE_SIZE: "20"
  MAX_PAGE_SIZE: "100"
  PURCHASE_CONFIRMATION_INTERVAL_SECONDS: "60"
  PURCHASE_MAX_VERIFICATION_ATTEMPTS: "3"

jobs:
  # Stage 1: Fast checks (linting, security) - no dependencies
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install dependencies (make install)
        run: make install
      - name: Install markdownlint
        run: npm install -g markdownlint-cli
      - name: Run lint
        run: make lint

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install dependencies (make install)
        run: make install
      - name: Run Bandit security scan
        run: make security

  # Stage 2: Unit tests + coverage - fast correctness gate
  test:
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install dependencies (make install)
        run: make install
      - name: Run unit tests with coverage
        run: make test
      - name: Check coverage threshold
        run: make coverage

  # Stage 3: Database-backed tests - only run if unit tests pass
  migrations:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install dependencies (make install)
        run: make install
      - name: Run migrations
        run: make migrate

  test-integration:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: clicknback_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d clicknback_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: "postgresql+asyncpg://user:password@localhost:5432/clicknback_test"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install dependencies (make install)
        run: make install
      - name: Run integration tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/integration/ -v
